name: jgmarket_flutter
description: "JGMarket - Tienda online migrada desde Astro a Flutter"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.1
  
  # Environment Variables
  flutter_dotenv: ^5.1.0
  
  # Supabase
  supabase_flutter: ^2.0.0
  
  # Cloudinary (signed uploads like Astro)
  crypto: ^3.0.3
  http_parser: ^4.0.2
  
  # Stripe
  flutter_stripe: ^10.1.1
  
  # HTTP
  http: ^1.2.0
  
  # URL Launcher
  url_launcher: ^6.2.1
  
  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  
  # Image Loading
  cached_network_image: ^3.3.0
  
  # Image Picker
  image_picker: ^1.0.7
  
  # Formatting
  intl: ^0.20.2

  # PDF Invoice Generation
  pdf: ^3.10.7
  printing: ^5.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  
  # Hive Code Generation
  build_runner: ^2.4.6
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - .env
    - assets/images/categories/
